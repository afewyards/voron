[force_move]
enable_force_move: True

[gcode_macro _RAISE_TOOL]
description: Raise the toolhead 2mm without homing
gcode:
    G90
    SET_KINEMATIC_POSITION Z=0 
    G0 Z2 F300
    M84
    
[gcode_macro _HOME_X]
gcode:
    {% set HOME_CURRENT = 1.0 %}
    {% set HOME_SENS = 2 %}
    {% set SENS = 20 %}
    
    SET_VELOCITY_LIMIT ACCEL=800
    # Set current for sensorless homing
    #{% set RUN_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].run_current|float %}
    #{% set RUN_HOLD_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].hold_current|float %}
    #{% set RUN_HOLD_SGT_X = printer.configfile.config['tmc5160 stepper_x'].driver_SGT|float %}

    #{% set RUN_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].run_current|float %}
    #{% set RUN_HOLD_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].hold_current|float %}
    #{% set RUN_HOLD_SGT_Y = printer.configfile.config['tmc5160 stepper_y'].driver_SGT|float %}
    
    SET_TMC_FIELD STEPPER=stepper_x FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_x1 FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_y FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_y1 FIELD=sgt VALUE=2
    #SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_x1 CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}

    G4 P1000

    # Home
    G28 X
    # Move away
    SET_VELOCITY_LIMIT ACCEL=5000
    G90
    G0 X125 F20000
    
    # Wait just a second… (give StallGuard registers time to clear)
    G4 P1000
    # Set current during print
    #SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X} HOLDCURRENT={RUN_HOLD_CURRENT_X}
    #SET_TMC_CURRENT STEPPER=stepper_x1 CURRENT={RUN_CURRENT_X} HOLDCURRENT={RUN_HOLD_CURRENT_X}
    #SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y} HOLDCURRENT={RUN_HOLD_CURRENT_Y}
    #SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT={RUN_CURRENT_Y} HOLDCURRENT={RUN_HOLD_CURRENT_Y}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_x1 FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_y FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_y1 FIELD=sgt VALUE=63

    G4 P1000
    
    SET_VELOCITY_LIMIT ACCEL={printer.toolhead.max_accel}


[gcode_macro _HOME_Y]
gcode:
    {% set HOME_CURRENT = 0.6 %}
    {% set SENS = 20 %}
    
    SET_VELOCITY_LIMIT ACCEL=800
    # Set current for sensorless homing
    #{% set RUN_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].run_current|float %}
    #{% set RUN_HOLD_CURRENT_X = printer.configfile.settings['tmc5160 stepper_x'].hold_current|float %}
    #{% set RUN_HOLD_SGT_X = printer.configfile.config['tmc5160 stepper_x'].driver_SGT|float %}

    #{% set RUN_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].run_current|float %}
    #{% set RUN_HOLD_CURRENT_Y = printer.configfile.settings['tmc5160 stepper_y'].hold_current|float %}
    #{% set RUN_HOLD_SGT_Y = printer.configfile.config['tmc5160 stepper_y'].driver_SGT|float %}

    SET_TMC_FIELD STEPPER=stepper_x FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_x1 FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_y FIELD=sgt VALUE=2
    SET_TMC_FIELD STEPPER=stepper_y1 FIELD=sgt VALUE=2
    #SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_x1 CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}
    #SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT={HOME_CURRENT} HOLDCURRENT={HOME_CURRENT}

    G4 P1000

    # Home
    G28 Y
    # Move away
    SET_VELOCITY_LIMIT ACCEL=5000
    G91
    G0 Y120 F20000

    # Wait just a second… (give StallGuard registers time to clear)
    G4 P1000
    # Set current during print
    #SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X} HOLDCURRENT={RUN_HOLD_CURRENT_X}
    #SET_TMC_CURRENT STEPPER=stepper_x1 CURRENT={RUN_CURRENT_X} HOLDCURRENT={RUN_HOLD_CURRENT_X}
    #SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y} HOLDCURRENT={RUN_HOLD_CURRENT_Y}
    #SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT={RUN_CURRENT_Y} HOLDCURRENT={RUN_HOLD_CURRENT_Y}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_x1 FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_y FIELD=sgt VALUE=63
    SET_TMC_FIELD STEPPER=stepper_y1 FIELD=sgt VALUE=63

    G4 P1000

    SET_VELOCITY_LIMIT ACCEL={printer.toolhead.max_accel}

[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if home_all %}
    M104 S150                    ; set extruder to print temp
  {% endif %}

  {% if home_all or 'X' in params %}
    _RAISE_TOOL
    _HOME_X
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    _HOME_Y
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    G90
    G0 X125 Y120 F2000
    M104 S150                    ; set extruder to print temp
    M109 S150 
    G91
    BEACON_AUTO_CALIBRATE
    G0 Z10 F5000
    G90
    {% if not printer.motors_sync.applied %}
     SYNC_MOTORS
    {% endif %}
  {% endif %}
