[include config/*.cfg]
[include macros/*.cfg]

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_3F003200105053424E363620-if00
canbus_uuid: f9a11dbece4b

[mcu Z]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_11400112A1086EAF5849DC5EC72000F5-if00

[mcu rpi]
serial: /tmp/klipper_host_mcu

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]
[respond] 
[input_shaper]
shaper_freq_x: 115.8
shaper_type_x: ei
damping_ratio_x: 0.026
# Recommended shaper is MZV @ 67.2 Hz (when using a square corner velocity of 4.0 and a damping ratio of 0.053)
shaper_freq_y: 79.4
shaper_type_y: ei
damping_ratio_y: 0.052
# Recommended shaper is MZV @ 49.4 Hz (when using a square corner velocity of 4.0 and a damping ratio of 0.060)
# Recommended shaper is MZV @ 47.4 Hz (when using a square corner velocity of 4.0 and a computed damping ratio of 0.054)

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 36000

[printer]
kinematics: corexy
max_velocity: 800
max_z_velocity: 100
max_z_accel: 3500
square_corner_velocity: 5.0 

minimum_cruise_ratio: 0.2
max_accel: 35000

[firmware_retraction]
retract_length: 0.2
retract_speed: 40
unretract_speed: 40




#   See the "heater_generic" section for the definition of this
#   parameter.

#[filament_switch_sensor filament]
#switch_pin: PG9

#[safe_z_home]
#home_xy_position: 186.5,255
#z_hop: 5.0


#####################################################################
# 	Beacon
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_6D8F1B2A5154354D38202020FF0A1C03-if00
x_offset: 0 # update with offset from nozzle on your machine
y_offset: 29 # update with offset from nozzle on your machine

mesh_main_direction: x
mesh_runs: 2

contact_max_hotend_temperature: 180 # increase to probe at print temps

[resonance_tester]
accel_chip: beacon
probe_points:
   125,125,20

   
#   125,125,60

#[resonance_tester]
#accel_chip: beacon
#probe_points: 150,150,3.5
#accel_per_hz: 125
#min_freq: 5
#max_freq: 200
#hz_per_sec: 2
#sweeping_accel: 1000
#sweeping_period: 1


#####################################################################
# 	LED Control
#####################################################################

[output_pin caselight]
pin: PB0
pwm: 1
value: 0.5
cycle_time: 0.005

[output_pin caselight2]
pin: PA3
pwm: 1
value: 0.5
cycle_time: 0.005


  
