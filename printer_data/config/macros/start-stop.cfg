
[gcode_macro PRINT_START]
gcode:
  {% if printer.toolhead.homed_axes == "xyz" %}
    G90
  {% else %}
    RESPOND TYPE=echo MSG="Homing"
    G28
  {% endif %}
  {% if not printer.motors_sync.applied %}
    SYNC_MOTORS
  {% endif %}
  G90
  ;M104 S150
  M104 S{params.EXTRUDER}
  ;RESPOND TYPE=echo MSG="Parking nozzle on z-stop"
  G0 Z20 X125 Y0 F5000
  ;G0 Z1 F1000
  M83
  M140 S{params.BED}
  SET_HEATER_TEMPERATURE HEATER=chamber TARGET={params.CHAMBER|default(60)|float}
  M190 S{params.BED}
  
  ;SET_GCODE_OFFSET Z_ADJUST={params.OFFSET|default(0)|float}
  SET_GCODE_OFFSET Z=0.07
  ;SET_GCODE_OFFSET Z=0.11
  QUAD_GANTRY_LEVEL
  ;G28 Z
  
  ;M104 S{params.EXTRUDER}
  BED_MESH_CALIBRATE

  M190 S{params.BED}
  M109 S{params.EXTRUDER}
  G4 P60000 ; heatsoak the nozzle

  SQUIGGLY_PURGE
  M221 S100
  M107
  G21 ; set units to millimeters
  G90 ; use absolute coordinates
  M83 ; use relative distances for extrusion

   
[gcode_macro PRINT_END]
gcode:
  #  Commence PRINT_END
  M400                             ; wait for buffer to clear
  G92 E0                           ; zero the extruder
  MOVE_END_SAFE
  TURN_OFF_HEATERS
  SET_FAN_SPEED FAN=part_cooling SPEED=0
  M117 Finished!
  

    