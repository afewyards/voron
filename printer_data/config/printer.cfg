[respond]
[include chopper_tune.cfg]
[include config/*.cfg]
[include macros/*.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_29002C000151313433343333-if00

[mcu Z]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_0E001C001251333031373138-if00

[mcu rpi]
serial: /tmp/klipper_host_mcu

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]
[respond] 
[input_shaper]
shaper_freq_x: 179.0
shaper_type_x: zv
damping_ratio_x: 0.0437

shaper_freq_y: 121.2 
shaper_type_y: zv
damping_ratio_y: 0.0415


[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 36000

[printer]
kinematics: corexy
max_velocity: 800
max_z_velocity: 100
max_z_accel: 3500
square_corner_velocity: 50.0 

minimum_cruise_ratio: 0
max_accel: 80000

[firmware_retraction]
retract_length: 0.4
retract_speed: 45
unretract_speed: 45




#   See the "heater_generic" section for the definition of this
#   parameter.

#[filament_switch_sensor filament]
#switch_pin: PG9

#[safe_z_home]
#home_xy_position: 186.5,255
#z_hop: 5.0


#####################################################################
# 	Beacon
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_6D8F1B2A5154354D38202020FF0A1C03-if00
x_offset: 0 # update with offset from nozzle on your machine
y_offset: 18 # update with offset from nozzle on your machine

mesh_main_direction: x
mesh_runs: 2

contact_max_hotend_temperature: 230 # increase to probe at print temps

[resonance_tester]
accel_chip: beacon
probe_points:
   125,120,5
min_freq: 5
max_freq: 220

   
#   125,125,60

#[resonance_tester]
#accel_chip: beacon
#probe_points: 150,150,3.5
#accel_per_hz: 125
#min_freq: 5
#max_freq: 200
#hz_per_sec: 2
#sweeping_accel: 1000
#sweeping_period: 1




  
